<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countdown Widget</title>
  <style>
    :root {
      color-scheme: light;
      --image-url: none;
      --page-bg: transparent;
      --accent: #b7c49f;
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-border: rgba(255, 255, 255, 0.56);
      --label-color: rgba(255, 255, 255, 0.94);
      --separator-color: rgba(255, 255, 255, 0.94);
      --title-color: #ffffff;
      --card-shadow: 0 22px 46px rgba(19, 18, 16, 0.24);
      --radius: 10px;
      --countdown-gap: 16px;
      --digit-gap: 7px;
      --digit-width: 62px;
      --digit-height: 86px;
      --digit-font-size: 2.7rem;
      --label-font-size: 1rem;
      --title-font-size: 1.1rem;
      --panel-padding: 0px;
      --blur-strength: 0px;
      --panel-max-width: 940px;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
      --flip-duration: 0.72s;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      position: relative;
      isolation: isolate;
      background: transparent;
      color: #fff;
      font-family: "Trebuchet MS", "Aptos", "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body[data-theme="glass"] {
      --accent: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.16);
      --card-border: rgba(255, 255, 255, 0.28);
      --label-color: rgba(255, 255, 255, 0.88);
      --separator-color: rgba(255, 255, 255, 0.9);
      --card-shadow: 0 22px 48px rgba(10, 15, 25, 0.28);
      --radius: 18px;
      --blur-strength: 18px;
      --page-bg: transparent;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
    }

    body[data-theme="midnight"] {
      --accent: #f8d47b;
      --card-bg: linear-gradient(180deg, #1a2333, #111827);
      --card-border: rgba(248, 212, 123, 0.2);
      --label-color: rgba(244, 246, 248, 0.9);
      --separator-color: rgba(248, 212, 123, 0.85);
      --card-shadow: 0 18px 42px rgba(2, 8, 23, 0.45);
      --radius: 14px;
      --page-bg: transparent;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
    }

    body[data-theme="minimal"] {
      --accent: #223032;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(34, 48, 50, 0.14);
      --label-color: rgba(34, 48, 50, 0.88);
      --separator-color: rgba(34, 48, 50, 0.72);
      --title-color: #223032;
      --card-shadow: none;
      --radius: 18px;
      --digit-gap: 10px;
      --page-bg: transparent;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
    }

    body[data-theme="luxe"] {
      --accent: #7a5a2f;
      --card-bg: linear-gradient(180deg, #fffdf7, #f0e2c5);
      --card-border: rgba(202, 165, 108, 0.42);
      --label-color: rgba(255, 247, 235, 0.96);
      --separator-color: rgba(245, 216, 167, 0.94);
      --title-color: #fff8ec;
      --card-shadow:
        0 12px 0 rgba(102, 68, 35, 0.14),
        0 28px 56px rgba(54, 33, 17, 0.32);
      --radius: 16px;
      --page-bg: transparent;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
    }

    body[data-theme="aurora"] {
      --accent: #ecffff;
      --card-bg: linear-gradient(180deg, rgba(240, 255, 255, 0.95), rgba(149, 205, 208, 0.92));
      --card-border: rgba(255, 255, 255, 0.46);
      --label-color: rgba(245, 255, 255, 0.96);
      --separator-color: rgba(215, 255, 255, 0.92);
      --title-color: #f1ffff;
      --card-shadow:
        0 12px 0 rgba(27, 92, 96, 0.18),
        0 28px 56px rgba(6, 34, 38, 0.34);
      --radius: 18px;
      --page-bg: transparent;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
    }

    body[data-theme="ember"] {
      --accent: #ffd7a8;
      --card-bg: linear-gradient(180deg, #5f3a31, #241210);
      --card-border: rgba(255, 200, 140, 0.32);
      --label-color: rgba(255, 242, 231, 0.96);
      --separator-color: rgba(255, 200, 140, 0.94);
      --title-color: #fff2e2;
      --card-shadow:
        0 14px 0 rgba(73, 35, 24, 0.24),
        0 30px 58px rgba(16, 8, 7, 0.42);
      --radius: 16px;
      --page-bg: transparent;
      --panel-bg: transparent;
      --panel-border: transparent;
      --panel-shadow: none;
    }

    .page-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .page-backdrop::before,
    .page-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .page-backdrop::before {
      background-image: var(--image-url);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: 0;
    }

    body[data-has-image="true"] .page-backdrop::before {
      opacity: 1;
    }

    .page-backdrop::after {
      background: var(--page-bg);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .widget-shell {
      position: relative;
      z-index: 1;
      width: fit-content;
      max-width: min(var(--panel-max-width), 100%);
      padding: var(--panel-padding);
      border-radius: calc(var(--radius) + 6px);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--panel-shadow);
      backdrop-filter: none;
    }

    .header {
      display: grid;
      gap: 6px;
      justify-items: center;
      margin-bottom: 10px;
      text-align: center;
    }

    .title {
      font-size: var(--title-font-size);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--title-color);
    }

    .subtitle {
      font-size: 0.96rem;
      color: rgba(255, 255, 255, 0.8);
    }

    body[data-theme="minimal"] .subtitle {
      color: rgba(34, 48, 50, 0.72);
    }

    .countdown {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: var(--countdown-gap);
    }

    .unit {
      display: grid;
      gap: 8px;
      justify-items: center;
      min-width: min-content;
    }

    .digits {
      display: flex;
      gap: var(--digit-gap);
      align-items: center;
    }

    .digit {
      position: relative;
      width: var(--digit-width);
      height: var(--digit-height);
      border-radius: var(--radius);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(var(--blur-strength));
      color: var(--accent);
      overflow: hidden;
      isolation: isolate;
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .digit::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: calc(50% - 0.5px);
      height: 1px;
      background: rgba(0, 0, 0, 0.14);
      z-index: 6;
      pointer-events: none;
    }

    .digit-face,
    .digit-flap {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      color: inherit;
      font-size: var(--digit-font-size);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.06em;
      text-align: center;
    }

    .digit-face {
      z-index: 1;
    }

    .digit-face span,
    .digit-flap span {
      display: block;
      line-height: 1;
    }

    .digit-face-top,
    .digit-flap-front {
      top: 0;
      align-items: flex-end;
      padding-bottom: 0.05em;
    }

    .digit-face-top span,
    .digit-flap-front span {
      transform: translateY(50%);
    }

    .digit-face-bottom,
    .digit-flap-back {
      bottom: 0;
      align-items: flex-start;
      padding-top: 0.05em;
    }

    .digit-face-bottom span,
    .digit-flap-back span {
      transform: translateY(-50%);
    }

    .digit-face-top {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 78%);
    }

    .digit-face-bottom {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), transparent 70%);
    }

    .digit-flap {
      z-index: 4;
      background: var(--card-bg);
      backface-visibility: hidden;
      pointer-events: none;
    }

    .digit-flap-front {
      top: 0;
      transform-origin: bottom center;
      animation: flipFront var(--flip-duration) cubic-bezier(0.22, 0.7, 0.2, 1) both;
      box-shadow:
        inset 0 -10px 18px rgba(0, 0, 0, 0.08),
        0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .digit-flap-back {
      top: 50%;
      bottom: auto;
      transform-origin: top center;
      transform: rotateX(90deg);
      animation: flipBack var(--flip-duration) cubic-bezier(0.18, 0.72, 0.2, 1) both;
      box-shadow:
        inset 0 10px 18px rgba(255, 255, 255, 0.08),
        0 10px 18px rgba(0, 0, 0, 0.08);
    }

    @keyframes flipFront {
      0% {
        transform: rotateX(0deg);
      }

      100% {
        transform: rotateX(-90deg);
      }
    }

    @keyframes flipBack {
      0% {
        transform: rotateX(90deg);
      }

      100% {
        transform: rotateX(0deg);
      }
    }

    .separator {
      align-self: start;
      padding-top: 14px;
      color: var(--separator-color);
      font-size: clamp(2.4rem, 4.2vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
      user-select: none;
    }

    .label {
      color: var(--label-color);
      font-size: clamp(0.92rem, 1.4vw, var(--label-font-size));
      font-weight: 700;
      line-height: 1.15;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
    }

    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.96rem;
      color: rgba(255, 255, 255, 0.9);
    }

    body[data-theme="minimal"] .status {
      color: rgba(34, 48, 50, 0.78);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 960px) {
      :root {
        --digit-width: 58px;
        --digit-height: 80px;
        --digit-font-size: 2.45rem;
        --countdown-gap: 16px;
      }
    }

    @media (max-width: 640px) {
      :root {
        --digit-width: 52px;
        --digit-height: 72px;
        --digit-font-size: 2.2rem;
        --digit-gap: 6px;
        --countdown-gap: 12px;
      }

      .separator {
        font-size: 2rem;
        padding-top: 10px;
      }
    }

    @media (max-width: 520px) {
      .countdown {
        gap: 14px 10px;
      }

      .separator {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .digit-flap-front,
      .digit-flap-back {
        animation: none;
        transform: none;
      }
    }
  </style>
</head>
<body data-theme="soft" data-has-image="false">
  <div class="page-backdrop" aria-hidden="true"></div>
  <main class="widget-shell">
    <header class="header hidden" id="header">
      <div class="title" id="title"></div>
      <div class="subtitle hidden" id="subtitle"></div>
    </header>
    <section class="countdown" id="countdown" aria-live="polite"></section>
    <div class="status hidden" id="status"></div>
  </main>

  <script>
    const LABELS = {
      sv: ["Dagar", "Timmar", "Minuter", "Sekunder"],
      en: ["Days", "Hours", "Minutes", "Seconds"],
      no: ["Dager", "Timer", "Minutter", "Sekunder"],
      da: ["Dage", "Timer", "Minutter", "Sekunder"]
    };

    const DEFAULTS = {
      target: "2026-12-31T23:59:59+01:00",
      theme: "soft",
      lang: "sv",
      title: "",
      subtitle: "",
      endText: "Nedrakningen ar klar",
      daysDigits: 3,
      showLabels: true,
      showSeparators: true,
      flip: false,
      accent: "",
      card: "",
      cardColor: "",
      cardOpacity: "",
      cardBorderColor: "",
      cardBorderOpacity: "",
      cardBorder: "",
      label: "",
      separator: "",
      titleColor: "",
      backgroundColor: "",
      backgroundOpacity: "",
      background: "",
      image: "",
      radius: "",
      gap: "",
      digitGap: "",
      width: "",
      height: "",
      digitWidth: "",
      digitHeight: "",
      digitFont: "",
      panelBg: "",
      panelBorder: "",
      panelShadow: "",
      titleSize: "",
      labelSize: "",
      padding: "",
      labels: ""
    };

    const body = document.body;
    const header = document.getElementById("header");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const countdown = document.getElementById("countdown");
    const status = document.getElementById("status");

    const parseBoolean = (value, fallback) => {
      if (value === "" || value == null) return fallback;
      if (["1", "true", "yes", "on"].includes(String(value).toLowerCase())) return true;
      if (["0", "false", "no", "off"].includes(String(value).toLowerCase())) return false;
      return fallback;
    };

    const escapeHtml = (value) => String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const applyVar = (name, value, formatter = (input) => input) => {
      if (!value && value !== 0) return;
      body.style.setProperty(name, formatter(value));
    };

    const scaleShadowAlpha = (shadowValue, factor) => {
      if (!shadowValue || shadowValue === "none") return shadowValue;
      const safeFactor = Math.max(0, Math.min(1, factor));
      return shadowValue
        .replace(/rgba\(([^)]+)\)/g, (match, inner) => {
          const parts = inner.split(",").map((part) => part.trim());
          if (parts.length !== 4) return match;
          const alpha = Math.max(0, Math.min(1, Number.parseFloat(parts[3]) || 0));
          return "rgba(" + parts[0] + ", " + parts[1] + ", " + parts[2] + ", " + (alpha * safeFactor).toFixed(4) + ")";
        })
        .replace(/rgb\(([^)]+)\)/g, (match, inner) => {
          const parts = inner.split(",").map((part) => part.trim());
          if (parts.length !== 3) return match;
          return "rgba(" + parts[0] + ", " + parts[1] + ", " + parts[2] + ", " + safeFactor.toFixed(4) + ")";
        });
    };

    const hexToRgb = (value) => {
      if (!/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(value)) return null;
      const normalized = value.length === 4
        ? "#" + value.slice(1).split("").map((char) => char + char).join("")
        : value;
      const intValue = Number.parseInt(normalized.slice(1), 16);
      return {
        r: (intValue >> 16) & 255,
        g: (intValue >> 8) & 255,
        b: intValue & 255
      };
    };

    const mergeConfig = (target, source) => {
      if (!source || typeof source !== "object") return;
      for (const key of Object.keys(DEFAULTS)) {
        if (source[key] !== undefined && source[key] !== null) {
          target[key] = source[key];
        }
      }
    };

    const safeLabels = (config) => {
      if (config.labels) {
        const custom = String(config.labels).split("|").map((item) => item.trim()).filter(Boolean);
        if (custom.length === 4) {
          return custom;
        }
      }
      return LABELS[config.lang] || LABELS.sv;
    };

    const setText = (node, value) => {
      if (!value) return;
      node.textContent = value;
      node.classList.remove("hidden");
    };

    const normalizeTheme = (value) => {
      const allowed = ["soft", "glass", "midnight", "minimal", "luxe", "aurora", "ember"];
      return allowed.includes(value) ? value : "soft";
    };

    const showStatus = (message) => {
      status.textContent = message;
      status.classList.remove("hidden");
    };

    const resetStatus = () => {
      status.textContent = "";
      status.classList.add("hidden");
    };

    const loadExternalConfig = async (source) => {
      const url = new URL(source, window.location.href);
      const response = await fetch(url.toString(), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Kunde inte lasa konfigurationen (" + response.status + ").");
      }
      const payload = await response.json();
      if (payload && typeof payload.settings === "object") {
        return payload.settings;
      }
      if (payload && typeof payload === "object") {
        return payload;
      }
      throw new Error("Konfigurationsfilen maste innehalla JSON-data.");
    };

    const buildConfig = async () => {
      const params = new URLSearchParams(window.location.search);
      const config = { ...DEFAULTS };

      if (params.has("config")) {
        try {
          const externalConfig = await loadExternalConfig(params.get("config"));
          mergeConfig(config, externalConfig);
        } catch (error) {
          showStatus("Konfigurationen kunde inte laddas: " + error.message);
          config.__loadFailed = true;
        }
      }

      for (const key of Object.keys(DEFAULTS)) {
        if (params.has(key)) {
          config[key] = params.get(key);
        }
      }

      return config;
    };

    const buildDigitMarkup = (digit, previousDigit, animate) => {
      const current = escapeHtml(digit);
      if (!animate) {
        return [
          '<div class="digit">',
          '  <div class="digit-face digit-face-top"><span>' + current + "</span></div>",
          '  <div class="digit-face digit-face-bottom"><span>' + current + "</span></div>",
          "</div>"
        ].join("");
      }

      const previous = escapeHtml(previousDigit);
      return [
        '<div class="digit is-flipping">',
        '  <div class="digit-face digit-face-top"><span>' + current + "</span></div>",
        '  <div class="digit-face digit-face-bottom"><span>' + current + "</span></div>",
        '  <div class="digit-flap digit-flap-front"><span>' + previous + "</span></div>",
        '  <div class="digit-flap digit-flap-back"><span>' + current + "</span></div>",
        "</div>"
      ].join("");
    };

    const formatDigits = (value, minimumDigits, previousValue, animateDigits) => {
      const digitCount = Math.max(
        minimumDigits,
        String(value).length,
        String(previousValue == null ? value : previousValue).length
      );
      const digits = String(value).padStart(digitCount, "0").split("");
      const previousDigits = String(previousValue == null ? value : previousValue).padStart(digitCount, "0").split("");
      return digits.map((digit, index) => {
        const shouldAnimate = animateDigits && previousValue != null && previousDigits[index] !== digit;
        return buildDigitMarkup(digit, previousDigits[index], shouldAnimate);
      }).join("");
    };

    const unitTemplate = (value, minimumDigits, labelText, showLabels, previousValue, animateDigits) => {
      return [
        '<div class="unit">',
        '  <div class="digits">' + formatDigits(value, minimumDigits, previousValue, animateDigits) + "</div>",
        showLabels ? '  <div class="label">' + escapeHtml(labelText) + "</div>" : "",
        "</div>"
      ].join("");
    };

    const separatorTemplate = () => '<div class="separator" aria-hidden="true">:</div>';

    const applyVisualConfig = (config) => {
      body.dataset.theme = normalizeTheme(config.theme);
      body.dataset.hasImage = "false";
      body.style.removeProperty("--image-url");
      body.style.removeProperty("--card-shadow");

      if (config.image) {
        body.style.setProperty("--image-url", 'url("' + String(config.image).replace(/"/g, '\\"') + '")');
        body.dataset.hasImage = "true";
      }

      applyVar("--accent", config.accent);
      if (config.cardColor) {
        const rgb = hexToRgb(String(config.cardColor));
        const opacity = Math.min(100, Math.max(0, Number.parseInt(config.cardOpacity || "100", 10))) / 100;
        if (rgb) {
          body.style.setProperty("--card-bg", "rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", " + opacity + ")");
        }
        if (!config.card) {
          const baseShadow = getComputedStyle(body).getPropertyValue("--card-shadow").trim();
          const scaledShadow = scaleShadowAlpha(baseShadow, opacity);
          if (scaledShadow) {
            body.style.setProperty("--card-shadow", scaledShadow);
          }
        }
      }
      applyVar("--card-bg", config.card);
      if (config.cardBorderColor) {
        const rgb = hexToRgb(String(config.cardBorderColor));
        const opacity = Math.min(100, Math.max(0, Number.parseInt(config.cardBorderOpacity || "100", 10))) / 100;
        if (rgb) {
          body.style.setProperty("--card-border", "rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", " + opacity + ")");
        }
      }
      applyVar("--card-border", config.cardBorder);
      applyVar("--label-color", config.label);
      applyVar("--separator-color", config.separator);
      applyVar("--title-color", config.titleColor);
      if (config.backgroundColor) {
        const rgb = hexToRgb(String(config.backgroundColor));
        const opacity = Math.min(100, Math.max(0, Number.parseInt(config.backgroundOpacity || "100", 10))) / 100;
        if (rgb) {
          body.style.setProperty("--page-bg", "rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", " + opacity + ")");
        }
      }
      applyVar("--page-bg", config.background);
      applyVar("--radius", config.radius, (value) => value + "px");
      applyVar("--countdown-gap", config.gap, (value) => value + "px");
      applyVar("--digit-gap", config.digitGap, (value) => value + "px");
      applyVar("--panel-max-width", config.width, (value) => value + "px");
      applyVar("--digit-width", config.digitWidth, (value) => value + "px");
      applyVar("--digit-height", config.digitHeight, (value) => value + "px");
      applyVar("--digit-font-size", config.digitFont, (value) => value + "px");
      applyVar("--panel-bg", config.panelBg);
      applyVar("--panel-border", config.panelBorder);
      applyVar("--panel-shadow", config.panelShadow);
      applyVar("--title-font-size", config.titleSize, (value) => value + "px");
      applyVar("--label-font-size", config.labelSize, (value) => value + "px");
      applyVar("--panel-padding", config.padding, (value) => value + "px");

    };

    const renderHeader = (config) => {
      header.classList.add("hidden");
      title.textContent = "";
      subtitle.textContent = "";
      subtitle.classList.add("hidden");

      setText(title, config.title);
      setText(subtitle, config.subtitle);

      if (title.textContent || subtitle.textContent) {
        header.classList.remove("hidden");
      }
    };

    const renderCountdown = (remaining, options, previousSnapshot) => {
      const parts = [
        unitTemplate(
          remaining.days,
          Math.max(options.daysDigits, String(remaining.days).length),
          options.labels[0],
          options.showLabels,
          previousSnapshot ? previousSnapshot.days : null,
          options.flip
        ),
        unitTemplate(
          remaining.hours,
          2,
          options.labels[1],
          options.showLabels,
          previousSnapshot ? previousSnapshot.hours : null,
          options.flip
        ),
        unitTemplate(
          remaining.minutes,
          2,
          options.labels[2],
          options.showLabels,
          previousSnapshot ? previousSnapshot.minutes : null,
          options.flip
        ),
        unitTemplate(
          remaining.seconds,
          2,
          options.labels[3],
          options.showLabels,
          previousSnapshot ? previousSnapshot.seconds : null,
          options.flip
        )
      ];

      countdown.innerHTML = parts
        .map((part, index) => {
          if (!options.showSeparators || index === parts.length - 1) return part;
          return part + separatorTemplate();
        })
        .join("");
    };

    const getRemaining = (targetDate) => {
      const diff = Math.max(targetDate.getTime() - Date.now(), 0);
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      return { diff, days, hours, minutes, seconds };
    };

    const createOptions = (config) => ({
      labels: safeLabels(config),
      showLabels: parseBoolean(config.showLabels, true),
      showSeparators: parseBoolean(config.showSeparators, true),
      daysDigits: Math.max(1, Number.parseInt(config.daysDigits, 10) || 3),
      flip: parseBoolean(config.flip, false)
    });

    const start = async () => {
      const params = new URLSearchParams(window.location.search);
      let currentConfig = null;
      let currentSignature = "";
      let targetDate = null;
      let options = null;
      let previousSnapshot = null;

      const applyConfigState = (config) => {
        applyVisualConfig(config);
        renderHeader(config);
        currentConfig = config;
        currentSignature = JSON.stringify(config);
        options = createOptions(config);
        targetDate = new Date(config.target);
        previousSnapshot = null;

        if (Number.isNaN(targetDate.getTime())) {
          countdown.innerHTML = '<div class="status">Ogiltigt datum. Ange till exempel 2026-12-31T23:59:59+01:00</div>';
          return false;
        }

        return true;
      };

      const initialConfig = await buildConfig();
      if (initialConfig.__loadFailed) {
        countdown.innerHTML = "";
        return;
      }

      if (!applyConfigState(initialConfig)) {
        return;
      }

      const update = () => {
        const remaining = getRemaining(targetDate);
        renderCountdown(remaining, options, previousSnapshot);
        previousSnapshot = remaining;

        if (remaining.diff <= 0) {
          showStatus(currentConfig.endText);
        } else if (!status.textContent.startsWith("Konfigurationen kunde inte")) {
          resetStatus();
        }
      };

      update();
      window.setInterval(update, 1000);

      if (params.has("config")) {
        window.setInterval(async () => {
          const refreshedConfig = await buildConfig();
          if (refreshedConfig.__loadFailed) return;
          const nextSignature = JSON.stringify(refreshedConfig);
          if (nextSignature !== currentSignature && applyConfigState(refreshedConfig)) {
            update();
          }
        }, 30000);
      }
    };

    start();
  </script>
</body>
</html>
